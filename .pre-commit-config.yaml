fail_fast: true
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-yaml
          - id: check-toml
          - id: check-json
          - id: end-of-file-fixer
          - id: trailing-whitespace
          - id: check-merge-conflict
          - id: check-added-large-files
          - id: mixed-line-ending

    # Bun Hooks
    # NOTE: These hooks use bun and run via 'language: system' (supported by prek).
    - repo: local
      hooks:
          - id: prettier
            name: prettier
            entry: bash -c 'bun run format'
            language: system
            files: ^.*\.(svelte|ts|js|json|css|html)$
            pass_filenames: false

          - id: eslint
            name: eslint
            entry: bash -c 'bun run lint'
            language: system
            files: ^.*\.(svelte|ts|js)$
            pass_filenames: false
